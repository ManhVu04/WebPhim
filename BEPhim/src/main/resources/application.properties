spring.application.name=BEPhim
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://mongo3:27019/webphim?directConnection=true}

# External API base
ophim.base-url=${OPHIM_BASE_URL:https://ophim1.com/v1/api/}

# OAuth/OIDC public URLs
app.auth.issuer=${APP_AUTH_ISSUER:http://localhost:8080}
app.auth.spa-redirect-uri=${APP_AUTH_SPA_REDIRECT_URI:http://localhost:5173/callback}
app.auth.spa-post-logout-redirect-uri=${APP_AUTH_SPA_POST_LOGOUT_REDIRECT_URI:http://localhost:5173/}

# Content Security Policy
app.security.csp.allowed-frame-hosts=${APP_SECURITY_CSP_ALLOWED_FRAME_HOSTS:}

# Actuator health probes
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Response compression
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,text/plain,text/html,text/xml,text/css,application/javascript

# Logging
logging.level.com.example.bephim=INFO
logging.level.org.springframework.security=INFO
